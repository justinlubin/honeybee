[Function.bismark]
params.reads = "SeqReads"
ret = "SeqAlignment"
condition = [
    "reads.qc = true",
    "reads.trimmed = true",
    "reads.long = false",
    "reads.type = \"em\"",
    "ret.type = reads.type",
    "ret.compressed = true",
]
info.title = "Bismark"
info.description = """# Align EM-converted reads with [Bismark](https://felixkrueger.github.io/Bismark/bismark/alignment/)

Bismark uses [bowtie2](https://bowtie-bio.sourceforge.net/bowtie2/index.shtml)
under the hood to align wet-lab EM-converted sample reads to an in silico
EM-converted reference."""
info.google_scholar_id = "10716431004487472020"
info.pmid = "21493656"
info.citation = "Krueger F, Andrews SR. Bismark: a flexible aligner and methylation caller for Bisulfite-Seq applications. Bioinformatics. 2011 Jun 1;27(11):1571-2. doi: 10.1093/bioinformatics/btr167. Epub 2011 Apr 14. PMID: 21493656; PMCID: PMC3102221."
info.additional_citations = ["Langmead B, Salzberg SL. Fast gapped-read alignment with Bowtie 2. Nat Methods. 2012 Mar 4;9(4):357-9. doi: 10.1038/nmeth.1923. PMID: 22388286; PMCID: PMC3322381."]
info.hyperparameters = [
    {name = 'FORWARD_READ_SUFFIX', default = '"_R1"', comment = 'The suffix at the end of the filenames for the forward reads' },
    {name = 'REVERSE_READ_SUFFIX', default = '"_R2"', comment = 'The suffix at the end of the filenames for the reverse reads' },
]
info.code = '''for path in sorted(glob.glob(f"{__hb_reads.path}/*{FORWARD_READ_SUFFIX}.fastq.gz")):
    sample_name = stem(path).removesuffix(FORWARD_READ_SUFFIX)
    log(f"Running bismark on '{path}'...")
    bash(f"""
        bismark \
            --bam \
            --parallel 1 \
            --genome {__hb_reads.path}/reference \
            -o {__hb_ret.path} \
            -1 {__hb_reads.path}/{sample_name}{FORWARD_READ_SUFFIX}.fastq.gz \
            -2 {__hb_reads.path}/{sample_name}{REVERSE_READ_SUFFIX}.fastq.gz
    """)'''

