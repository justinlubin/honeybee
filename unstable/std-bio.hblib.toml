[Function.cutadapt]
params.reads = "SeqReads"
ret = "SeqReads"
condition = [
    "reads.qc = true",
    "reads.trimmed = false",
    "ret.qc = false",
    "ret.trimmed = true",
    "ret.long = reads.long",
    "ret.type = reads.type",
]
info.title = "cutadapt (include poly(A) tails)"
info.description = """# Remove sequencing adapters using [cutadapt](https://cutadapt.readthedocs.io/en/stable/)

[Adapter trimming](https://knowledge.illumina.com/library-preparation/general/library-preparation-general-reference_material-list/000001314)
removes adapter sequences that are present due to a read length being
longer than the insert size of the sequence in a sequencer."""
info.google_scholar_id = "4180123542769751602"
info.citation = "Marcel Martin. Cutadapt removes adapter sequences from high-throughput sequencing reads. EMBnet.Journal, 17(1):10-12, May 2011. http://dx.doi.org/10.14806/ej.17.1.200"
info.use = "to remove sequencing adapters"
info.hyperparameters = [
    {name = 'FORWARD_ADAPTER', default = '"AGATCGGAAGAGCACACGTCTGAACTCCAGTCA"', comment = 'The forward adapter, by default the Illumina universal' },
    {name = 'REVERSE_ADAPTER', default = '"AGATCGGAAGAGCGTCGTGTAGGGAAAGAGTGT"', comment = 'The reverse adapter, by default the Illumina universal (can delete for single-end only)' },
    {name = 'CORES', default = '4', comment = 'The number of cores to use' },
]
info.code = '''sample_sheet = pl.read_csv(f"{shared()}/sample_sheet.csv")

for sample in sample_sheet.rows(named=True):
    # Paired-end
    if sample["reverse_location"]:
        # --cores number of cores, -m 1 remove reads <1, -a forward adapter
        # -A reverse adapter, -o forward output, -o reverse output
        bash(f"""uv run cutadapt
                    --cores={CORES}
                    -m 1
                    -a {FORWARD_ADAPTER}
                    -A {REVERSE_ADAPTER}
                    -o {__hb_ret.path}/{sample["forward_location"]}
                    -p {__hb_ret.path}/{sample["reverse_location"]}
                    {__hb_reads.path}/{sample["forward_location"]}
                    {__hb_reads.path}/{sample["reverse_location"]}""")

    # Single-end
    else:
        # --cores number of cores, -m 1 remove reads <1, -a forward adapter
        # -o forward output
        bash(f"""uv run cutadapt
                    --cores={CORES}
                    -m 1
                    -a {FORWARD_ADAPTER}
                    -o {__hb_ret.path}/{sample["forward_location"]}
                    {__hb_reads.path}/{sample["forward_location"]}""")'''

[Function.minimap2]
params.reads = "SeqReads"
ret = "SeqAlignment"
condition = [
    "reads.qc = true",
    "reads.trimmed = true",
    "reads.long = true",
    "ret.type = reads.type",
    "ret.compressed = false",
]
info.title = "minimap2"
info.description = """# Align noisy long reads (~10% error rate) to a reference genome with [minimap2](https://lh3.github.io/minimap2/)

While traditional aligners like [BWA](https://github.com/lh3/bwa) or
[bowtie2](https://bowtie-bio.sourceforge.net/bowtie2/index.shtml) _can_
align long reads, minimap2 is a dedicated tool that aligns long reads much
more quickly."""
info.google_scholar_id = "5235337231718602932"
info.pmid = "29750242"
info.citation = "Li H. Minimap2: pairwise alignment for nucleotide sequences. Bioinformatics. 2018 Sep 15;34(18):3094-3100. doi: 10.1093/bioinformatics/bty191. PMID: 29750242; PMCID: PMC6137996."
info.use = "to align long reads"
info.hyperparameters = [
]
info.code = '''for path in sorted(glob.glob(f"{__hb_reads.path}/*.fastq")):
    sample_name = os.path.splitext(os.path.basename(path))[0]
    bash(f"""
        minimap2 -a
            -x map-ont
            --sam-hit-only
            "{shared()}/reference/reference.fasta"
            "{path}"
            > "{__hb_ret.path}/{sample_name}.sam"
    """)'''

[Function.bam_sort_index]
params.align = "SeqAlignment"
ret = "SeqAlignment"
condition = [
    "ret.type = align.type",
    "align.compressed = false",
    "ret.compressed = true",
]
info.title = "Compress to BAM"
info.description = """# Converted uncompressed SAM files to compressed BAM files

This step also **sorts** and **indexes** the alignments."""
info.search = false
info.hyperparameters = [
]
info.code = '''for path in sorted(glob.glob(f"{__hb_align.path}/*.sam")):
    sample_name = os.path.splitext(os.path.basename(path))[0]
    bash(f"""
        samtools view -bS "{path}" \
        | samtools sort -o "{__hb_ret.path}/{sample_name}.bam"
    """)
    bash(f"""
        samtools index "{__hb_ret.path}/{sample_name}.bam"
    """)'''

